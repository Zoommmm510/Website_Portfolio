name: Deploy public site to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build public artifact
        shell: bash
        run: |
          SITE_DIR="personal-website"
          mkdir -p _site
          cp "$SITE_DIR/index.html" _site/
          cp "$SITE_DIR/request.html" _site/
          cp "$SITE_DIR/portfolio.html" _site/
          cp "$SITE_DIR/favicon.svg" _site/
          cp "$SITE_DIR/styles.css" _site/
          cp "$SITE_DIR/data.js" _site/
          cp "$SITE_DIR/script.js" _site/
          cp "$SITE_DIR/portfolio.js" _site/
          cp "$SITE_DIR/company-directory.js" _site/
          cp "$SITE_DIR/supabase-config.js" _site/
          cp "$SITE_DIR/cloud-store.js" _site/
          touch _site/.nojekyll
          if [ -f "$SITE_DIR/CNAME" ]; then cp "$SITE_DIR/CNAME" _site/CNAME; elif [ -f CNAME ]; then cp CNAME _site/CNAME; fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
