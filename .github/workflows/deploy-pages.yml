name: Deploy public site to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build public artifact
        shell: bash
        run: |
          mkdir -p _site
          cp index.html _site/
          cp request.html _site/
          cp portfolio.html _site/
          cp styles.css _site/
          cp data.js _site/
          cp script.js _site/
          cp portfolio.js _site/
          cp company-directory.js _site/
          cp supabase-config.js _site/
          cp cloud-store.js _site/
          touch _site/.nojekyll
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
